name: Backup MongoDB

# Roda diariamente às 04:00 UTC (01:00 BRT)
# Salva backup como artifact (90 dias retenção GitHub gratuito)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:  # permite rodar manualmente

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Run backup
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: npx tsx scripts/backup.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mongodb-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90
